<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moni夢霓～今天吃什麼？</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Serif+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --gold-pale: #f5e6b8;
  --dark: #0d0b08;
  --dark-2: #141209;
  --dark-3: #1c1810;
  --dark-4: #242016;
  --cream: #f0e6cc;
  --cream-dim: rgba(240,230,204,0.7);
  --cream-faint: rgba(240,230,204,0.15);
  --gold-glow: rgba(201,168,76,0.25);
  --gold-glow-strong: rgba(201,168,76,0.45);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--dark);
  color: var(--cream);
  font-family: 'Noto Serif TC', serif;
  min-height: 100vh;
  overflow-x: hidden;
  cursor: default;
}

/* ── GRAIN OVERLAY ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  opacity: 0.5;
}

/* ── BACKGROUND ── */
.bg-layer {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 20%, rgba(201,168,76,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 80% 80%, rgba(201,168,76,0.05) 0%, transparent 70%),
    linear-gradient(160deg, #0d0b08 0%, #141209 40%, #0f0d09 100%);
  pointer-events: none;
}

/* 背景圖 */
.bg-image {
  position: fixed; inset: 0; z-index: 0;
  background: url('background.png') center 20%/cover no-repeat;
  opacity: 0.18;
  pointer-events: none;
  display: block;
}

/* ── GOLD LINES DECO ── */
.deco-line {
  display: block;
  width: 80px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0 auto;
}
.deco-line-v {
  display: block;
  width: 1px; height: 60px;
  background: linear-gradient(180deg, transparent, var(--gold-light), transparent);
  margin: 0 auto;
}

/* ── WRAPPER ── */
.page { position: relative; z-index: 1; }

/* ══════════════════════════════
   HERO SECTION
══════════════════════════════ */
.hero {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 6rem 1.5rem 3rem;
  text-align: center;
  position: relative;
}

.hero-badge {
  display: inline-flex; align-items: center; gap: 10px;
  border: 0.5px solid rgba(201,168,76,0.4);
  border-radius: 99px;
  padding: 6px 20px;
  font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--gold); font-family: 'Cormorant Garamond', serif; font-weight: 300;
  margin-bottom: 2rem;
  animation: fadeUp 0.8s ease both;
}
.hero-badge::before, .hero-badge::after {
  content: '✦'; font-size: 8px; color: var(--gold-light);
}

.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.4rem, 6vw, 4.2rem);
  font-weight: 400; line-height: 1.15;
  color: var(--cream);
  animation: fadeUp 0.8s 0.1s ease both;
  letter-spacing: 0.02em;
}
.hero-title em {
  font-style: italic;
  color: var(--gold-light);
  display: block;
}

.hero-subtitle {
  margin-top: 1.2rem;
  font-size: 14px; letter-spacing: 0.12em;
  color: var(--cream-dim); font-weight: 300;
  animation: fadeUp 0.8s 0.2s ease both;
}

.scroll-hint {
  position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  animation: fadeUp 1s 0.8s ease both;
}
.scroll-hint span { font-size: 10px; letter-spacing: 0.2em; color: rgba(201,168,76,0.5); text-transform: uppercase; }
.scroll-arrow {
  width: 1px; height: 40px;
  background: linear-gradient(180deg, var(--gold), transparent);
  animation: scrollPulse 2s ease infinite;
}
@keyframes scrollPulse { 0%,100%{opacity:0.3;transform:scaleY(1)} 50%{opacity:1;transform:scaleY(1.1)} }

/* ══════════════════════════════
   SPINNER SECTION
══════════════════════════════ */
.spinner-section {
  padding: 5rem 1.5rem;
  max-width: 1000px; margin: 0 auto;
}

.section-header {
  text-align: center; margin-bottom: 3.5rem;
}
.section-tag {
  font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--gold); font-family: 'Cormorant Garamond', serif;
  display: block; margin-bottom: 0.8rem;
}
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.6rem, 3.5vw, 2.4rem);
  font-weight: 400; color: var(--cream);
}

/* ── SPINNER LAYOUT ── */
.spinner-layout {
  display: grid;
  grid-template-columns: 1fr 340px 1fr;
  gap: 2rem;
  align-items: start;
}
@media(max-width:768px) {
  .spinner-layout { grid-template-columns: 1fr; }
  .panel-left { order: 2; }
  .panel-center { order: 1; }
  .panel-right { order: 3; }
}

/* ── WHEEL ── */
.panel-center { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }

.wheel-frame {
  position: relative; width: 300px; height: 300px;
}
.wheel-ring {
  position: absolute; inset: -8px;
  border-radius: 50%;
  border: 1px solid rgba(201,168,76,0.3);
  box-shadow: 0 0 30px var(--gold-glow), inset 0 0 20px rgba(0,0,0,0.5);
  pointer-events: none;
}
.wheel-ring::before {
  content: '';
  position: absolute; inset: -6px;
  border-radius: 50%;
  border: 0.5px solid rgba(201,168,76,0.15);
}
.wheel-pointer {
  position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
  z-index: 10;
  filter: drop-shadow(0 0 6px var(--gold));
}
.wheel-pointer svg { display: block; }
#wheel-canvas {
  border-radius: 50%;
  display: block;
  box-shadow: 0 0 60px rgba(0,0,0,0.8);
}

/* ── FOOD INPUT PANEL ── */
.glass-panel {
  background: rgba(28,24,16,0.7);
  border: 0.5px solid rgba(201,168,76,0.2);
  border-radius: 12px;
  padding: 1.4rem;
  backdrop-filter: blur(12px);
}

.panel-label {
  font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--gold); display: block; margin-bottom: 1rem;
}

.food-input-row {
  display: flex; gap: 8px; margin-bottom: 1rem;
}
.food-input-row input {
  flex: 1; padding: 8px 12px;
  background: rgba(255,255,255,0.04);
  border: 0.5px solid rgba(201,168,76,0.25);
  border-radius: 6px;
  color: var(--cream); font-size: 14px;
  font-family: 'Noto Serif TC', serif;
  outline: none; transition: border-color 0.2s;
}
.food-input-row input:focus { border-color: var(--gold); }
.food-input-row input::placeholder { color: rgba(240,230,204,0.25); }

.btn-add {
  padding: 8px 14px;
  background: rgba(201,168,76,0.1);
  border: 0.5px solid rgba(201,168,76,0.4);
  border-radius: 6px;
  color: var(--gold); font-size: 18px; line-height: 1;
  cursor: pointer; transition: all 0.2s;
  font-family: sans-serif;
}
.btn-add:hover { background: rgba(201,168,76,0.2); box-shadow: 0 0 12px var(--gold-glow); }

.food-tags {
  display: flex; flex-wrap: wrap; gap: 6px;
  max-height: 140px; overflow-y: auto;
}
.food-tag {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 99px;
  font-size: 12px; font-weight: 300;
  border: 0.5px solid rgba(201,168,76,0.3);
  background: rgba(201,168,76,0.07);
  color: var(--cream-dim);
  transition: all 0.2s;
}
.food-tag:hover { border-color: rgba(201,168,76,0.6); color: var(--cream); }
.tag-del { cursor: pointer; color: rgba(201,168,76,0.4); font-size: 11px; transition: color 0.15s; }
.tag-del:hover { color: var(--gold); }

.btn-reset {
  margin-top: 0.8rem;
  width: 100%; padding: 7px;
  background: transparent;
  border: 0.5px solid rgba(201,168,76,0.15);
  border-radius: 6px;
  color: rgba(201,168,76,0.4); font-size: 11px; letter-spacing: 0.1em;
  cursor: pointer; font-family: 'Noto Serif TC', serif;
  transition: all 0.2s;
}
.btn-reset:hover { border-color: rgba(201,168,76,0.3); color: var(--gold); }

/* ── MESSAGE BOX ── */
.msg-panel {
  background: rgba(28,24,16,0.7);
  border: 0.5px solid rgba(201,168,76,0.2);
  border-radius: 12px;
  padding: 1.5rem;
  text-align: center;
  backdrop-filter: blur(12px);
  min-height: 180px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
}

.sticker-area {
  font-size: 0;
  width: 80px; height: 80px;
  display: flex; align-items: center; justify-content: center;
}
/* 貼圖圖片 — 預設隱藏,JS 切換 */
.sticker-img {
  width: 80px; height: 80px;
  object-fit: contain;
  display: none;
}
/* 備用 emoji(沒有貼圖時顯示)*/
.sticker-emoji { font-size: 52px; line-height: 1; }
.sticker-area.animate .sticker-emoji,
.sticker-area.animate .sticker-img {
  animation: stickerBounce 0.5s ease infinite alternate;
}
@keyframes stickerBounce {
  from { transform: scale(1) rotate(-4deg); }
  to   { transform: scale(1.12) rotate(4deg); }
}

.msg-text {
  font-size: 13px; line-height: 1.8;
  color: var(--cream-dim); font-weight: 300;
  white-space: pre-line;
}
.msg-result {
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-style: italic;
  color: var(--gold-light);
  text-shadow: 0 0 20px var(--gold-glow-strong);
}

/* ── SPIN & EAT BUTTONS ── */
.btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

.btn-spin {
  position: relative; overflow: hidden;
  padding: 14px 36px;
  background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.08));
  border: 1px solid var(--gold);
  border-radius: 8px;
  color: var(--gold-light);
  font-size: 16px; letter-spacing: 0.08em;
  font-family: 'Noto Serif TC', serif; font-weight: 400;
  cursor: pointer; transition: all 0.3s;
  box-shadow: 0 0 20px rgba(201,168,76,0.1);
}
.btn-spin::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 30%, rgba(201,168,76,0.15) 50%, transparent 70%);
  transform: translateX(-100%);
  transition: transform 0.5s;
}
.btn-spin:hover::before { transform: translateX(100%); }
.btn-spin:hover {
  box-shadow: 0 0 40px rgba(201,168,76,0.3), 0 0 80px rgba(201,168,76,0.1);
  transform: translateY(-1px);
}
.btn-spin:active { transform: scale(0.98); }
.btn-spin:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

.btn-eat {
  padding: 14px 28px;
  background: transparent;
  border: 0.5px solid rgba(201,168,76,0.35);
  border-radius: 8px;
  color: var(--cream-dim); font-size: 14px; letter-spacing: 0.06em;
  font-family: 'Noto Serif TC', serif;
  cursor: pointer; transition: all 0.3s;
  display: none;
}
.btn-eat:hover {
  border-color: var(--gold);
  color: var(--gold-light);
  box-shadow: 0 0 20px var(--gold-glow);
}

/* ══════════════════════════════
   VIDEO MODAL (新增)
══════════════════════════════ */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.92);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  backdrop-filter: blur(8px);
  animation: modalFadeIn 0.4s ease;
}
.modal-overlay.show {
  display: flex;
}

@keyframes modalFadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal-content {
  position: relative;
  max-width: 90vw;
  max-height: 85vh;
  animation: modalSlideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes modalSlideUp {
  from {
    opacity: 0;
    transform: translateY(40px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.modal-video-wrapper {
  position: relative;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid rgba(201,168,76,0.3);
  box-shadow: 0 0 80px rgba(201,168,76,0.15), 0 30px 80px rgba(0,0,0,0.8);
}

.modal-video-wrapper::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 16px;
  box-shadow: inset 0 0 60px rgba(0,0,0,0.4);
  pointer-events: none;
  z-index: 1;
}

.modal-video {
  display: block;
  max-width: 100%;
  max-height: 85vh;
  width: auto;
  height: auto;
  object-fit: contain;
}

.modal-badge {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 24px;
  background: rgba(13, 11, 8, 0.85);
  border: 0.5px solid rgba(201,168,76,0.4);
  border-radius: 99px;
  font-size: 11px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold-light);
  font-family: 'Cormorant Garamond', serif;
  backdrop-filter: blur(12px);
  z-index: 2;
  animation: badgePulse 2s ease infinite;
}

.modal-badge::before,
.modal-badge::after {
  content: '✦';
  font-size: 9px;
  color: var(--gold);
}

@keyframes badgePulse {
  0%, 100% { box-shadow: 0 0 20px rgba(201,168,76,0.2); }
  50% { box-shadow: 0 0 40px rgba(201,168,76,0.4); }
}

.modal-caption {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 28px;
  background: rgba(13, 11, 8, 0.9);
  border: 0.5px solid rgba(201,168,76,0.25);
  border-radius: 99px;
  font-size: 13px;
  letter-spacing: 0.12em;
  color: var(--gold-light);
  font-family: 'Noto Serif TC', serif;
  font-style: italic;
  backdrop-filter: blur(12px);
  text-align: center;
  white-space: nowrap;
  z-index: 2;
}

.modal-close {
  position: absolute;
  top: -50px;
  right: 0;
  width: 44px;
  height: 44px;
  background: rgba(28, 24, 16, 0.8);
  border: 0.5px solid rgba(201,168,76,0.3);
  border-radius: 50%;
  color: var(--gold);
  font-size: 24px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
  backdrop-filter: blur(12px);
}

.modal-close:hover {
  background: rgba(201,168,76,0.15);
  border-color: var(--gold);
  transform: rotate(90deg);
  box-shadow: 0 0 20px rgba(201,168,76,0.3);
}

@media(max-width: 768px) {
  .modal-close {
    top: -60px;
    right: 50%;
    transform: translateX(50%);
  }
  .modal-close:hover {
    transform: translateX(50%) rotate(90deg);
  }
  .modal-caption {
    font-size: 11px;
    padding: 10px 20px;
    white-space: normal;
    max-width: 90%;
  }
}

/* ══════════════════════════════
   DIVIDER
══════════════════════════════ */
.divider {
  max-width: 400px; margin: 0 auto;
  display: flex; align-items: center; gap: 1.5rem;
  padding: 2rem 1.5rem;
}
.divider-line { flex: 1; height: 0.5px; background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent); }
.divider-icon { color: var(--gold); font-size: 12px; letter-spacing: 0.2em; white-space: nowrap; }

/* ══════════════════════════════
   SOCIAL SECTION
══════════════════════════════ */
.social-section {
  padding: 3rem 1.5rem 6rem;
  text-align: center;
}

.social-tagline {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.1rem, 2.5vw, 1.5rem);
  font-weight: 300; font-style: italic;
  color: var(--cream-dim); margin-bottom: 2.5rem;
  letter-spacing: 0.05em;
}

.social-links {
  display: flex; flex-wrap: wrap;
  justify-content: center; gap: 12px;
}

.social-link {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 22px;
  border: 0.5px solid rgba(201,168,76,0.25);
  border-radius: 99px;
  color: var(--cream-dim); font-size: 13px; letter-spacing: 0.08em;
  text-decoration: none;
  font-family: 'Noto Serif TC', serif;
  transition: all 0.3s;
  background: rgba(201,168,76,0.04);
}
.social-link:hover {
  border-color: var(--gold);
  color: var(--gold-light);
  background: rgba(201,168,76,0.1);
  box-shadow: 0 0 20px var(--gold-glow);
  transform: translateY(-2px);
}
.social-icon { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }

/* ══════════════════════════════
   FOOTER
══════════════════════════════ */
footer {
  border-top: 0.5px solid rgba(201,168,76,0.1);
  padding: 2rem 1.5rem;
  text-align: center;
  font-size: 11px; letter-spacing: 0.15em;
  color: rgba(240,230,204,0.2);
}
footer span { color: rgba(201,168,76,0.3); }

/* ══════════════════════════════
   ANIMATIONS
══════════════════════════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes spinGlow {
  0%,100% { box-shadow: 0 0 20px rgba(201,168,76,0.1); }
  50%      { box-shadow: 0 0 50px rgba(201,168,76,0.4); }
}
.spinning .wheel-ring { animation: spinGlow 0.8s ease infinite; }

/* ══════════════════════════════
   SCROLLBAR
══════════════════════════════ */
.food-tags::-webkit-scrollbar { width: 3px; }
.food-tags::-webkit-scrollbar-track { background: transparent; }
.food-tags::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 99px; }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-image"></div>
<div class="page">

<!-- ══ HERO ══ -->
<section class="hero">
  <div class="hero-badge">Moni 夢霓 出品</div>
  <h1 class="hero-title">
    今天,<em>吃什麼?</em>
  </h1>
  <p class="hero-subtitle">讓命運替你決定 · 感謝世界 · 感謝自己</p>
  <div style="margin-top:2rem; animation: fadeUp 0.8s 0.4s ease both;">
    <span class="deco-line"></span>
  </div>

  <div class="scroll-hint">
    <span>開始轉吧</span>
    <div class="scroll-arrow"></div>
  </div>
</section>

<!-- ══ SPINNER ══ -->
<section class="spinner-section">
  <div class="section-header">
    <span class="section-tag">✦ 命運轉盤 ✦</span>
    <h2 class="section-title">旋轉,決定今日餐點</h2>
  </div>

  <div class="spinner-layout">

    <!-- 左側:食物輸入 -->
    <div class="panel-left">
      <div class="glass-panel">
        <span class="panel-label">✦ 我想吃的</span>
        <div class="food-input-row">
          <input id="food-input" type="text" placeholder="輸入食物名稱…" maxlength="12"
            onkeydown="if(event.key==='Enter') addFood()" />
          <button class="btn-add" onclick="addFood()" title="新增">＋</button>
        </div>
        <div class="food-tags" id="food-tags"></div>
        <button class="btn-reset" onclick="resetDefault()">↺ 還原預設清單</button>
      </div>
    </div>

    <!-- 中間:轉盤 -->
    <div class="panel-center">
      <div class="wheel-frame" id="wheel-frame">
        <div class="wheel-ring"></div>
        <div class="wheel-pointer">
          <svg width="24" height="28" viewBox="0 0 24 28">
            <polygon points="12,2 22,22 12,18 2,22" fill="#c9a84c" stroke="none"/>
            <polygon points="12,2 22,22 12,18 2,22" fill="none" stroke="rgba(255,220,100,0.4)" stroke-width="1"/>
          </svg>
        </div>
        <canvas id="wheel-canvas" width="300" height="300"></canvas>
      </div>

<script>
/* ══════════════════════════════
   設定區
══════════════════════════════ */
const STICKERS = {
  idle:   { img: '',                emoji: '✨' },
  spin:   { img: 'stickers/spin.gif',   emoji: '🌀' },
  result: { img: 'stickers/result.gif', emoji: '🎉' },
  eat:    { img: 'stickers/eat.gif',    emoji: '🥳' },
};
const AUDIO = {
  spin:   'sounds/spinning.mp3',
  result: 'sounds/result.mp3',
  eat:    'sounds/eat.mp3',
};
const TTS = {
  spin:   '今天要吃什麼呢?要吃香噴噴的白飯還是肉肉料理呢?香酥的炸物也很吸引人呢!',
  result: '決定今天吃這個!',
  eat:    '感謝世界感謝自己,今天我也好好吃飯,我好棒!',
};

/* ── 用餐影片路徑 (修改這裡) ── */
const EATING_VIDEO = 'eating.mp4'; // 你的影片檔名

/* ══════════════════════════════
   轉盤顏色
══════════════════════════════ */
const WHEEL_COLORS = [
  ['#3d2e0a','#e8c97a'],['#1a1508','#c9a84c'],
  ['#4a380c','#f5e6b8'],['#251c07','#e8c97a'],
  ['#5a4510','#c9a84c'],['#1c1509','#f5e6b8'],
  ['#3a2c0c','#e8c97a'],['#2a2009','#c9a84c'],
  ['#4e3b0e','#f5e6b8'],['#1e1707','#e8c97a'],
  ['#42320b','#c9a84c'],['#281e08','#f5e6b8'],
];

const DEFAULT_FOODS = ['滷肉飯','雞腿便當','牛肉麵','炸雞排','壽司','火鍋','拉麵','燒肉','水餃','義大利麵','咖哩飯','鹽酥雞'];
let foods = [...DEFAULT_FOODS];
let spinning = false;
let currentAngle = 0;
let result = null;

/* ── 音訊 ── */
const audioCache = {};
function playAudio(key) {
  const src = AUDIO[key];
  if (!src) { useTTS(key); return; }
  if (!audioCache[key]) audioCache[key] = new Audio(src);
  const a = audioCache[key];
  a.currentTime = 0;
  a.play().catch(() => useTTS(key));
}
function useTTS(key) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(TTS[key] || '');
  u.lang = 'zh-TW'; u.rate = 0.95; u.pitch = 1.05;
  const voices = window.speechSynthesis.getVoices();
  const tw = voices.find(v => v.lang === 'zh-TW') || voices.find(v => v.lang.startsWith('zh'));
  if (tw) u.voice = tw;
  window.speechSynthesis.speak(u);
}

/* ── 貼圖切換 ── */
function setSticker(key) {
  const cfg = STICKERS[key] || STICKERS.idle;
  const area = document.getElementById('sticker-area');
  const img  = document.getElementById('sticker-img');
  const emoji= document.getElementById('sticker-emoji');
  area.classList.remove('animate');
  void area.offsetWidth;
  area.classList.add('animate');
  if (cfg.img) {
    img.src = cfg.img + '?t=' + Date.now();
    img.style.display = 'block';
    emoji.style.display = 'none';
  } else {
    emoji.textContent = cfg.emoji;
    emoji.style.display = 'block';
    img.style.display = 'none';
  }
}

/* ── 訊息 ── */
function setMsg(text, resultName) {
  document.getElementById('msg-text').innerHTML = text;
  const r = document.getElementById('msg-result');
  if (resultName) { r.textContent = resultName; r.style.display = 'block'; }
  else r.style.display = 'none';
}

/* ── 轉盤繪製 ── */
const canvas = document.getElementById('wheel-canvas');
const ctx = canvas.getContext('2d');
const CX = 150, CY = 150, R = 138;

function drawWheel() {
  ctx.clearRect(0, 0, 300, 300);
  const n = foods.length;
  if (n === 0) {
    ctx.fillStyle = '#1c1810'; ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#c9a84c'; ctx.font = '14px serif'; ctx.textAlign = 'center';
    ctx.fillText('請新增食物', CX, CY+5);
    return;
  }
  const arc = (Math.PI*2) / n;
  for (let i = 0; i < n; i++) {
    const [bg, fg] = WHEEL_COLORS[i % WHEEL_COLORS.length];
    const start = currentAngle + arc*i - Math.PI/2;
    const end = start + arc;
    ctx.beginPath(); ctx.moveTo(CX,CY); ctx.arc(CX,CY,R,start,end); ctx.closePath();
    ctx.fillStyle = bg; ctx.fill();
    ctx.strokeStyle = 'rgba(201,168,76,0.25)'; ctx.lineWidth = 1; ctx.stroke();

    ctx.save();
    ctx.translate(CX, CY); ctx.rotate(start + arc/2);
    ctx.fillStyle = fg;
    const label = foods[i];
    const fs = label.length > 6 ? 11 : label.length > 4 ? 13 : 15;
    ctx.font = `400 ${fs}px "Noto Serif TC", serif`;
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText(label, R - 12, 0);
    ctx.restore();
  }
  ctx.beginPath(); ctx.arc(CX,CY,20,0,Math.PI*2);
  ctx.fillStyle = '#0d0b08'; ctx.fill();
  ctx.strokeStyle = 'rgba(201,168,76,0.5)'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = '#c9a84c'; ctx.font = '10px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('✦', CX, CY);
}

/* ── 食物管理 ── */
function renderTags() {
  const c = document.getElementById('food-tags');
  c.innerHTML = '';
  foods.forEach((f, i) => {
    const [bg, fg] = WHEEL_COLORS[i % WHEEL_COLORS.length];
    const tag = document.createElement('div');
    tag.className = 'food-tag';
    tag.style.cssText = `background:${bg}; color:${fg}; border-color:rgba(201,168,76,0.2)`;
    tag.innerHTML = `${f}&thinsp;<span class="tag-del" onclick="removeFood(${i})">✕</span>`;
    c.appendChild(tag);
  });
}
function addFood() {
  const inp = document.getElementById('food-input');
  const v = inp.value.trim();
  if (!v) return;
  if (foods.length >= 12) { setMsg('最多 12 個選項喔!'); return; }
  if (foods.includes(v)) { setMsg('已經有這個了!'); return; }
  foods.push(v); inp.value = '';
  renderTags(); drawWheel();
}
function removeFood(i) { foods.splice(i,1); renderTags(); drawWheel(); }
function resetDefault() { foods = [...DEFAULT_FOODS]; renderTags(); drawWheel(); }

/* ── 旋轉 ── */
function spin() {
  if (spinning || foods.length < 2) return;
  spinning = true;
  document.getElementById('spin-btn').disabled = true;
  document.getElementById('eat-btn').style.display = 'none';
  document.getElementById('wheel-frame').classList.add('spinning');
  result = null;

  setSticker('spin');
  setMsg('今天要吃什麼呢?\n要吃香噴噴的白飯還是肉肉料理呢?\n香酥的炸物也很吸引人呢!');
  playAudio('spin');

  const extra = (Math.PI*2) * (6 + Math.random()*4);
  const target = currentAngle + extra;
  const duration = 4000 + Math.random()*1500;
  const t0 = performance.now();
  const a0 = currentAngle;
  function ease(t) { return 1 - Math.pow(1-t, 3); }

  (function frame(now) {
    const p = Math.min((now - t0) / duration, 1);
    currentAngle = a0 + (target - a0) * ease(p);
    drawWheel();
    if (p < 1) { requestAnimationFrame(frame); return; }
    currentAngle = target;
    spinning = false;
    document.getElementById('spin-btn').disabled = false;
    document.getElementById('wheel-frame').classList.remove('spinning');

    const n = foods.length;
    const arc = (Math.PI*2) / n;
    const norm = (((-currentAngle % (Math.PI*2)) + Math.PI*2 + Math.PI/2) % (Math.PI*2));
    result = foods[Math.floor(norm / arc) % n];

    setSticker('result');
    setMsg('決定今天吃這個!', result);
    playAudio('result');
    document.getElementById('eat-btn').style.display = 'inline-block';
  })(performance.now());
}

/* ── 開動 (開啟影片 modal) ── */
function eat() {
  setSticker('eat');
  setMsg('感謝世界感謝自己,\n今天我也好好吃飯,\n我好棒!');
  playAudio('eat');

  // 顯示影片 modal
  const modal = document.getElementById('modal-overlay');
  const video = document.getElementById('modal-video');
  
  // 重新載入影片並從頭播放
  video.currentTime = 0;
  video.play();
  
  modal.classList.add('show');
  
  // 防止背景滾動
  document.body.style.overflow = 'hidden';
}

/* ── 關閉 Modal ── */
function closeModal(event) {
  // 如果點擊的是覆蓋層本身或關閉按鈕
  if (!event || event.target.id === 'modal-overlay' || event.target.classList.contains('modal-close')) {
    const modal = document.getElementById('modal-overlay');
    const video = document.getElementById('modal-video');
    
    // 暫停影片
    video.pause();
    
    modal.classList.remove('show');
    document.body.style.overflow = '';
  }
}

// ESC 鍵關閉
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeModal();
  }
});

/* 初始化 */
window.speechSynthesis && window.speechSynthesis.getVoices();
renderTags();
drawWheel();
</script>
</body>
